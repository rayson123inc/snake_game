<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1>Snake</h1>
      <div class="stats">
        <span>Score: <strong id="score">0</strong></span>
        <span>Best: <strong id="best">0</strong></span>
      </div>
    </header>

    <section class="game-wrap">
      <canvas id="game" width="600" height="400" aria-label="Snake game"></canvas>
      <div id="overlay" class="overlay hidden">
        <p id="overlay-text">Game Over</p>
        <button id="restart-btn" type="button">Restart</button>
      </div>
    </section>

    <section class="controls">
      <button data-dir="up" aria-label="Move up">Up</button>
      <div class="control-row">
        <button data-dir="left" aria-label="Move left">Left</button>
        <button data-dir="down" aria-label="Move down">Down</button>
        <button data-dir="right" aria-label="Move right">Right</button>
      </div>
    </section>

    <p class="help">Use Arrow keys or WASD. Press Space to pause. Press R to restart.</p>
  </main>

  <script src="game.js"></script>
</body>
</html>
